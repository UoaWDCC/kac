name: Fly Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-web:
    name: Deploy Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@1.5
      - name: Deploy Client to Fly.io
        run: >
          flyctl deploy --remote-only --config fly.toml
        working-directory: ./client
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_CLIENT }}

  deploy-api:
    name: Deploy Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@1.5
      - name: Deploy Server to Fly.io
        run: flyctl deploy --remote-only --config fly.toml
        working-directory: ./server
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_SERVER }}

  finalize-deployment:
    name: Finalize Deployment
    runs-on: ubuntu-latest
    needs: [deploy-web, deploy-api]
    if: always()
    steps:
      - name: Create Deployment via GitHub API
        id: create
        run: |
          response=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/deployments \
            -d '{
              "ref": "${{ github.sha }}",
              "environment": "Fly Production",
              "required_contexts": [],
              "auto_merge": false,
              "description": "Deploying frontend and backend"
            }')
          echo "deployment_id=$(echo $response | jq -r '.id')" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Mark Deployment as Success
        if: ${{ needs.deploy-web.result == 'success' && needs.deploy-api.result == 'success' }}
        run: |
          curl -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/deployments/${{ steps.create.outputs.deployment_id }}/statuses \
            -d '{"state": "success"}'

      - name: Mark Deployment as Failure
        if: ${{ needs.deploy-web.result != 'success' || needs.deploy-api.result != 'success' }}
        run: |
          curl -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/deployments/${{ steps.create.outputs.deployment_id }}/statuses \
            -d '{"state": "failure"}'
