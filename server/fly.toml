# fly.toml app configuration file generated for kac-server on 2026-03-05T17:57:06+13:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'kac-server'
primary_region = 'syd'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
